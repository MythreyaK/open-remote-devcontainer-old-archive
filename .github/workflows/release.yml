name: Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Validate tag matches package.json version
        run: node .github/workflows/scripts/validate-version.js

      - name: Get commit timestamp for tag
        id: get_epoch
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct ${{ github.ref_name }})" >> "$GITHUB_ENV"

      - name: Package VSIX
        run: |
          echo "SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-<not set>}"
          npm run vsce:package

      - name: Find VSIX and generate SHA256
        id: vsix
        run: |
          VSIX_FILE=$(ls *.vsix | head -n1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No VSIX file found after packaging" >&2
            ls -la >&2
            exit 1
          fi
          VSIX_SHA=$(sha256sum "$VSIX_FILE" | tee "$VSIX_FILE.sha256" | awk '{print $1}')
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "vsix_sha256=$VSIX_FILE.sha256" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_FILE (sha256: $VSIX_SHA)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.vsix.outputs.vsix_file }}
            ${{ steps.vsix.outputs.vsix_sha256 }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
