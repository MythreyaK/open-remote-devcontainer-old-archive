name: Build release VSIX package

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: node:22.22.3-bookworm-slim
    defaults:
      run:
        shell: bash

    permissions:
      contents: read

    outputs:
      vsix_file:   ${{ steps.vsix.outputs.vsix_file }}
      vsix_sha256: ${{ steps.vsix.outputs.vsix_sha256 }}
      pre_release: ${{ steps.release_type.outputs.pre_release }}
      vsce_flag:   ${{ steps.release_type.outputs.vsce_flag }}

    steps:
      - name: Install git
        run: |
          apt-get update && apt-get install -y git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci && npm run dts

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Validate tag matches package.json version
        run: node .github/workflows/scripts/validate-version.js

      - name: Detect release / pre-release from minor version
        id: release_type
        run: |
          MINOR=$(echo "${{ github.ref_name }}" | sed 's/^v//' | cut -d. -f2)
          if (( MINOR % 2 == 1 )); then
            echo "pre_release=true" >> "$GITHUB_OUTPUT"
            echo "vsce_flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "pre_release=false" >> "$GITHUB_OUTPUT"
            echo "vsce_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Get commit timestamp for tag
        id: get_epoch
        env:
          GH_TAG: ${{ github.ref_name }}
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "$GH_TAG")" >> "$GITHUB_ENV"

      - name: Package VSIX
        env:
          TZ: UTC
        run: |
          echo "SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-<not set>}"
          npm run vsce:package -- ${{ steps.release_type.outputs.vsce_flag }}

      - name: Find VSIX and generate SHA256
        id: vsix
        run: |
          set -e
          VSIX_FILE=$(ls *.vsix | head -n1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No VSIX file found after packaging" >&2
            ls -la >&2
            exit 1
          fi
          VSIX_SHA=$(sha256sum "$VSIX_FILE" | tee "$VSIX_FILE.sha256" | awk '{print $1}')
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "vsix_sha256=$VSIX_FILE.sha256" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_FILE (sha256: $VSIX_SHA)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: |
            *.vsix
            *.vsix.sha256

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    container:
      image: node:22.22.3-bookworm-slim
    defaults:
      run:
        shell: bash

    permissions:
      contents: write

    steps:
      - name: Install git
        run: |
          apt-get update && apt-get install -y git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ needs.build-release.outputs.pre_release == 'true' }}
          files: |
            ${{ needs.build-release.outputs.vsix_file }}
            ${{ needs.build-release.outputs.vsix_sha256 }}
          generate_release_notes: false

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
          VSIX_FILE: ${{ needs.build-release.outputs.vsix_file }}
          VSCE_FLAG: ${{ needs.build-release.outputs.vsce_flag }}
        run: |
          set -e
          if [ -z "$OVSX_PAT" ]; then
            echo "::warning::Skipping Open VSX publish: OVSX_PAT secret is not set"
            exit 0
          fi
          npx ovsx publish $VSCE_FLAG --packagePath "$VSIX_FILE"
