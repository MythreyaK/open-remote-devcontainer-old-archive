name: Publish to Open VSX

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tagName:
        description: 'Tag name to publish (e.g., v0.2.0)'
        required: false
        type: string

jobs:
  publish-open-vsx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check OVSX_TOKEN is set
        run: |
          if [ -z "$OVSX_TOKEN" ]; then
            echo "Error: OVSX_TOKEN secret is not set" >&2
            exit 1
          fi
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Determine tag name
        id: tag
        run: |
          set -e
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tagName }}" ]; then
            TAG="${{ inputs.tagName }}"
          else
            echo "Error: This workflow must run for a release, a tag push, or provide 'tagName' input." >&2
            exit 1
          fi
          echo "gh_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package.json version
        run: node .github/workflows/scripts/validate-version.js

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Get commit timestamp for tag
        id: get_epoch
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct ${{ steps.tag.outputs.gh_tag }})" >> "$GITHUB_ENV"

      - name: Package VSIX
        run: |
          echo "SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-<not set>}"
          npm run vsce:package

      - name: Find VSIX and generate SHA256
        id: vsix
        run: |
          VSIX_FILE=$(ls *.vsix | head -n1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No VSIX file found after packaging" >&2
            ls -la >&2
            exit 1
          fi
          VSIX_SHA=$(sha256sum "$VSIX_FILE" | tee "$VSIX_FILE.sha256" | awk '{print $1}')
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "vsix_sha256=$VSIX_FILE.sha256" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_FILE (sha256: $VSIX_SHA)"

      - name: Publish to Open VSX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          set -e
          npx ovsx publish -p "$OVSX_TOKEN" --packagePath "${{ steps.vsix.outputs.vsix_file }}"
